name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Inject API key
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import os
          key = os.environ.get('ANTHROPIC_API_KEY', '')
          xor_str = ','.join(str(ord(c) ^ 83) for c in key)
          with open('src/utils/aiCoach.ts', 'r') as f:
              src = f.read()
          src = src.replace("'REPLACE_WITH_XOR'", "'" + xor_str + "'")
          with open('src/utils/aiCoach.ts', 'w') as f:
              f.write(src)
          print('Injected XOR key, chars:', len(key))
          PYEOF

      - name: Export web build
        run: npx expo export -p web --output-dir dist

      - name: Deploy to GitHub Pages
        run: |
          touch dist/.nojekyll
          cd dist
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Deploy"
          git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:gh-pages
